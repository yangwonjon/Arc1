<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>출석 체크</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; text-align: center; }

    .navbar {
      background-color: #333;
      display: flex;
      justify-content: center;
    }
    .navbar a {
      color: white;
      padding: 14px 40px;
      text-decoration: none;
      font-size: 15px;
      border-right: 1px solid #555;
      cursor: pointer;
    }
    .navbar a:first-child { border-left: 1px solid #555; }
    .navbar a:hover { background-color: #555; }

    .page { display: none; padding: 40px 20px; }
    .page.active { display: block; }

    .logo-text {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 20px;
      letter-spacing: 3px;
      color: #333;
    }
    input[type="text"] {
      padding: 10px;
      width: 200px;
      margin-right: 10px;
    }
    button {
      padding: 10px 20px;
      cursor: pointer;
    }
    #list { margin-top: 30px; display: block; text-align: center; }
    table { border-collapse: collapse; width: 500px; margin: 0 auto; }
    th, td { border: 1px solid #ddd; padding: 8px 16px; text-align: center; }
    th { background-color: #f2f2f2; }
    #statusMsg { margin-top: 10px; font-size: 14px; color: gray; }

    /* 러닝 */
    .running-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }
    .running-form input[type="text"] { width: 250px; }
    .upload-box {
      border: 2px dashed #aaa;
      padding: 20px;
      width: 300px;
      cursor: pointer;
      color: #888;
      border-radius: 8px;
    }
    .upload-box:hover { border-color: #333; color: #333; }
    #previewImg {
      max-width: 300px;
      margin-top: 10px;
      border-radius: 8px;
      display: none;
    }
    .parsed-result {
      margin-top: 10px;
      font-size: 14px;
      color: #333;
      background: #f9f9f9;
      border: 1px solid #ddd;
      padding: 10px 20px;
      border-radius: 8px;
      display: none;
    }
    #runningMsg { margin-top: 10px; font-size: 14px; color: gray; }
    #runningTable { margin-top: 30px; width: 600px; }
  </style>
</head>
<body>

  <div class="navbar">
    <a onclick="showPage('home')">홈</a>
    <a onclick="showPage('visitors')">최근 접속 목록</a>
    <a onclick="showPage('etc')">기타</a>
  </div>

  <!-- 홈 -->
  <div class="page active" id="page-home">
    <div style="margin-top:40px;">
      <div class="logo-text">ARC</div>
      <h2>출석 체크</h2>
      <input type="text" id="name" placeholder="이름 입력">
      <button id="checkBtn">출석</button>
      <div id="statusMsg">위치 확인 중...</div>
      <div id="list">
        <h3>오늘 출석 목록</h3>
        <table>
          <thead>
            <tr>
              <th>번호</th><th>이름</th><th>날짜</th><th>시간</th><th>출석률</th>
            </tr>
          </thead>
          <tbody id="attendanceBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 최근 접속 목록 -->
  <div class="page" id="page-visitors">
    <div style="margin-top:40px;">
      <h2>최근 접속 목록</h2>
      <table style="margin-top:20px;">
        <thead>
          <tr><th>번호</th><th>기기</th><th>날짜</th><th>시간</th></tr>
        </thead>
        <tbody id="visitorsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 기타 -->
  <div class="page" id="page-etc">
    <div style="margin-top:40px;">
      <h2>러닝 기록</h2>
      <div class="running-form">
        <input type="text" id="runName" placeholder="이름 입력">
        <div class="upload-box" onclick="document.getElementById('runImg').click()">
          📸 스크린샷 업로드
        </div>
        <input type="file" id="runImg" accept="image/*" style="display:none">
        <img id="previewImg">
        <div class="parsed-result" id="parsedResult"></div>
        <button id="saveRunBtn" style="display:none">저장</button>
        <div id="runningMsg"></div>
      </div>

      <table id="runningTable" style="margin: 30px auto 0;">
        <thead>
          <tr>
            <th>번호</th><th>이름</th><th>거리(km)</th><th>페이스</th><th>시간</th><th>날짜</th>
          </tr>
        </thead>
        <tbody id="runningBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const TOTAL = 12;
    const TARGET_LAT = 33.2549383;
    const TARGET_LNG = 126.3285698;
    const MAX_DISTANCE_KM = 5;

    const supabaseClient = window.supabase.createClient(
      "https://ndctjtuxpkwdldhqbnih.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kY3RqdHV4cGt3ZGxkaHFibmloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTgwMjAsImV4cCI6MjA5MDk5NDAyMH0.SrHCtqlNE4cgepGMw_NoPC56bnJIfV2_t7Hbmj5EXCY"
    );

    let parsedData = {};

    // 페이지 전환
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      if (id === 'visitors') loadVisitors();
      if (id === 'etc') loadRunning();
    }

    // 기기 감지
    function getDevice() {
      const ua = navigator.userAgent;
      if (/iPhone|iPad|iPod/.test(ua)) return '아이폰';
      if (/Android/.test(ua)) return '안드로이드';
      if (/Windows/.test(ua)) return 'Windows PC';
      if (/Mac/.test(ua)) return 'Mac';
      return '기타';
    }

    function getDeviceId() {
      let id = localStorage.getItem('device_id');
      if (!id) {
        id = 'dev_' + Math.random().toString(36).substr(2, 16);
        localStorage.setItem('device_id', id);
      }
      return id;
    }

    function getDistanceKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a =
        Math.sin(dLat/2)*Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
        Math.sin(dLng/2)*Math.sin(dLng/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function logVisitor() {
      await supabaseClient.from('visitors').insert([{ device: getDevice() }]);
    }

    async function loadVisitors() {
      const { data, error } = await supabaseClient
        .from('visitors').select('*')
        .order('created_at', { ascending: false }).limit(50);
      if (error) return;
      const tbody = document.getElementById('visitorsBody');
      tbody.innerHTML = '';
      data.forEach((row, i) => {
        const d = new Date(row.created_at);
        tbody.innerHTML += `<tr>
          <td>${i+1}</td>
          <td>${row.device}</td>
          <td>${d.toLocaleDateString('ko-KR')}</td>
          <td>${d.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'})}</td>
        </tr>`;
      });
    }

    async function loadList() {
      const today = new Date().toISOString().split('T')[0];
      const { data: todayData } = await supabaseClient.from('attendance').select('*')
        .gte('created_at', today+'T00:00:00').lte('created_at', today+'T23:59:59')
        .order('created_at', { ascending: true });
      const { data: allData } = await supabaseClient.from('attendance').select('name');
      if (!todayData || !allData) return;

      const countMap = {};
      allData.forEach(r => { countMap[r.name] = (countMap[r.name]||0)+1; });

      const seen = new Set();
      const unique = todayData.filter(r => {
        if (seen.has(r.name)) return false;
        seen.add(r.name); return true;
      });

      const tbody = document.getElementById('attendanceBody');
      tbody.innerHTML = '';
      unique.forEach((row, i) => {
        const d = new Date(row.created_at);
        tbody.innerHTML += `<tr>
          <td>${i+1}</td>
          <td>${row.name}</td>
          <td>${d.toLocaleDateString('ko-KR')}</td>
          <td>${d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</td>
          <td>${Math.round(((countMap[row.name]||1)/TOTAL)*100)}%</td>
        </tr>`;
      });
    }

    async function checkIn() {
      const name = document.getElementById('name').value.trim();
      if (!name) { alert('이름 입력해주세요'); return; }
      const statusMsg = document.getElementById('statusMsg');
      statusMsg.textContent = '위치 확인 중...';
      const deviceId = getDeviceId();
      const today = new Date().toISOString().split('T')[0];
      const { data: existing } = await supabaseClient.from('attendance').select('id')
        .eq('device_id', deviceId)
        .gte('created_at', today+'T00:00:00').lte('created_at', today+'T23:59:59');
      if (existing && existing.length > 0) {
        statusMsg.textContent = '❌ 오늘 이미 출석했어요';
        return;
      }
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const dist = getDistanceKm(pos.coords.latitude, pos.coords.longitude, TARGET_LAT, TARGET_LNG);
          if (dist > MAX_DISTANCE_KM) {
            statusMsg.textContent = `❌ 출석 불가 — ${dist.toFixed(1)}km 떨어져 있음`;
            return;
          }
          const { error } = await supabaseClient.from('attendance').insert([{ name, device_id: deviceId }]);
          if (error) { alert('에러: '+error.message); }
          else {
            statusMsg.textContent = `✅ 출석 완료 (${dist.toFixed(1)}km 이내)`;
            document.getElementById('name').value = '';
            loadList();
          }
        },
        () => { statusMsg.textContent = '❌ 위치 권한을 허용해주세요'; },
        { enableHighAccuracy: false, timeout: 5000, maximumAge: 60000 }
      );
    }

    // 이미지 업로드 → Claude AI 인식
    document.getElementById('runImg').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const preview = document.getElementById('previewImg');
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';

      const runningMsg = document.getElementById('runningMsg');
      runningMsg.textContent = '🔍 AI 분석 중...';

      const reader = new FileReader();
      reader.onload = async (ev) => {
        const base64 = ev.target.result.split(',')[1];
        const mediaType = file.type;

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 500,
              messages: [{
                role: "user",
                content: [
                  {
                    type: "image",
                    source: { type: "base64", media_type: mediaType, data: base64 }
                  },
                  {
                    type: "text",
                    text: "이 러닝 앱 스크린샷에서 거리(km), 페이스, 시간을 추출해줘. 반드시 JSON만 반환해. 예: {\"distance\": \"3.46\", \"pace\": \"5'37\\\"\", \"duration\": \"19:25\"}"
                  }
                ]
              }]
            })
          });

          const data = await response.json();
          const text = data.content.map(i => i.text || '').join('');
          const clean = text.replace(/```json|```/g, '').trim();
          parsedData = JSON.parse(clean);

          const resultDiv = document.getElementById('parsedResult');
          resultDiv.style.display = 'block';
          resultDiv.innerHTML = `
            📏 거리: <b>${parsedData.distance} km</b><br>
            ⚡ 페이스: <b>${parsedData.pace}</b><br>
            ⏱ 시간: <b>${parsedData.duration}</b>
          `;
          document.getElementById('saveRunBtn').style.display = 'inline-block';
          runningMsg.textContent = '';
        } catch (err) {
          runningMsg.textContent = '❌ 인식 실패 — 다시 시도해주세요';
          console.error(err);
        }
      };
      reader.readAsDataURL(file);
    });

    // 러닝 저장
    document.getElementById('saveRunBtn').addEventListener('click', async () => {
      const name = document.getElementById('runName').value.trim();
      if (!name) { alert('이름 입력해주세요'); return; }
      if (!parsedData.distance) { alert('사진을 먼저 업로드해주세요'); return; }

      const { error } = await supabaseClient.from('running').insert([{
        name,
        distance: parseFloat(parsedData.distance),
        pace: parsedData.pace,
        duration: parsedData.duration
      }]);

      if (error) {
        document.getElementById('runningMsg').textContent = '❌ 저장 실패: ' + error.message;
      } else {
        document.getElementById('runningMsg').textContent = '✅ 저장 완료!';
        document.getElementById('runName').value = '';
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('parsedResult').style.display = 'none';
        document.getElementById('saveRunBtn').style.display = 'none';
        parsedData = {};
        loadRunning();
      }
    });

    // 러닝 목록
    async function loadRunning() {
      const { data, error } = await supabaseClient.from('running').select('*')
        .order('created_at', { ascending: false });
      if (error) return;
      const tbody = document.getElementById('runningBody');
      tbody.innerHTML = '';
      data.forEach((row, i) => {
        const d = new Date(row.created_at);
        tbody.innerHTML += `<tr>
          <td>${i+1}</td>
          <td>${row.name}</td>
          <td>${row.distance}</td>
          <td>${row.pace}</td>
          <td>${row.duration}</td>
          <td>${d.toLocaleDateString('ko-KR')}</td>
        </tr>`;
      });
    }

    document.getElementById('checkBtn').addEventListener('click', checkIn);

    logVisitor();
    loadList();

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const dist = getDistanceKm(pos.coords.latitude, pos.coords.longitude, TARGET_LAT, TARGET_LNG);
        document.getElementById('statusMsg').textContent = dist <= MAX_DISTANCE_KM
          ? `✅ 출석 가능 위치 (${dist.toFixed(1)}km 이내)`
          : `❌ 출석 불가 위치 — ${dist.toFixed(1)}km 떨어져 있음`;
      },
      () => { document.getElementById('statusMsg').textContent = '❌ 위치 권한을 허용해주세요'; },
      { enableHighAccuracy: false, timeout: 5000, maximumAge: 60000 }
    );
  </script>

</body>
</html>
