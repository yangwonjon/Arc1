<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC 6월 최종 출석 현황</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; color: #222; }

    .top { padding: 28px 20px 16px; }
    .top h1 { font-size: 22px; font-weight: 800; }
    .top p { font-size: 13px; color: #999; margin-top: 4px; }

    .list { padding: 0 16px 40px; max-width: 440px; margin: 0 auto; }

    .row {
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .row.danger { border-left: 3px solid #ff4444; }
    .row.excluded { opacity: 0.4; }

    .num { font-size: 13px; color: #bbb; width: 18px; text-align: center; flex-shrink: 0; font-weight: 700; }
    .row:nth-child(1) .num { color: #f5c842; font-size: 16px; }
    .row:nth-child(2) .num { color: #aaa; }
    .row:nth-child(3) .num { color: #bf7c3a; }

    .info { flex: 1; }
    .name { font-size: 15px; font-weight: 700; }
    .bar-wrap { margin-top: 6px; background: #eee; border-radius: 100px; height: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 100px; background: #333; transition: width 0.8s ease; }
    .row.danger .bar-fill { background: #ff4444; }

    .right { text-align: right; flex-shrink: 0; }
    .pct { font-size: 17px; font-weight: 800; }
    .row.danger .pct { color: #ff4444; }
    .cnt { font-size: 11px; color: #bbb; margin-top: 2px; }

    .detail-btn {
      margin-top: 4px;
      font-size: 10px;
      color: #aaa;
      background: #f5f5f5;
      border: none;
      padding: 3px 7px;
      border-radius: 4px;
      cursor: pointer;
    }

    /* 모달 */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:999; align-items:center; justify-content:center; padding:20px; }
    .modal-bg.active { display:flex; }
    .modal-box { background:white; border-radius:14px; padding:20px; width:100%; max-width:300px; max-height:80vh; overflow-y:auto; }
    .modal-box h3 { font-size:16px; font-weight:800; margin-bottom:12px; }
    .modal-box table { width:100%; font-size:13px; border-collapse:collapse; }
    .modal-box td { padding:7px 4px; border-bottom:1px solid #f0f0f0; }
    .modal-box td:first-child { color:#bbb; font-size:11px; width:28px; }
    .modal-close { margin-top:12px; width:100%; padding:10px; background:#222; color:white; border:none; border-radius:8px; font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
  </style>
</head>
<body>

<div class="top" style="max-width:440px; margin:0 auto;">
  <h1>ARC 6월 최종 출석 현황 </h1>
  <p></p>
</div>

<div class="list" id="list">
  <div style="text-align:center;padding:40px;color:#ccc;font-size:13px;">불러오는 중...</div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('active')">닫기</button>
  </div>
</div>

<script>
  const MEMBERS  = ['윤민혁','고영지','김민수','송지용','양원준','지항민','김해건','양지훈'];
  const TOTAL    = 12;
  const EXCLUDED = new Set(['양원준','김해건','양지훈']);
  const EXCL_LBL = { '양원준':'탈퇴', '양지훈':'미활동', '김해건':'질병' };
  let allDates = {};

  const sb = window.supabase.createClient(
    "https://ndctjtuxpkwdldhqbnih.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kY3RqdHV4cGt3ZGxkaHFibmloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTgwMjAsImV4cCI6MjA5MDk5NDAyMH0.SrHCtqlNE4cgepGMw_NoPC56bnJIfV2_t7Hbmj5EXCY"
  );

  async function load() {
    const { data } = await sb.from('attendance').select('name, created_at').order('created_at', { ascending: false });
    const counts = {}, lastDate = {};
    MEMBERS.forEach(m => { counts[m] = 0; lastDate[m] = null; allDates[m] = []; });
    const days = ['일','월','화','수','목','금','토'];

    data?.forEach(r => {
      if (counts[r.name] === undefined) return;
      const d = new Date(r.created_at);
      if (d.getFullYear() !== 2026 || d.getMonth() + 1 !== 6) return;
      counts[r.name]++;
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      const wk = days[d.getDay()];
      const t = d.getHours() * 60 + d.getMinutes();
      const isSub = !(t >= 1202 && t <= 1260);
      allDates[r.name].push(`${mm}-${dd} (${wk})${isSub ? ' 🔄' : ''}`);
      if (!lastDate[r.name]) lastDate[r.name] = `${mm}.${dd}`;
    });

    const active = MEMBERS.filter(m => !EXCLUDED.has(m))
      .map(m => ({ name: m, count: counts[m], rate: Math.round(counts[m]/TOTAL*100) }))
      .sort((a, b) => b.count - a.count);
    const excl = MEMBERS.filter(m => EXCLUDED.has(m))
      .map(m => ({ name: m, count: counts[m], rate: Math.round(counts[m]/TOTAL*100), excl: true }));

    const list = document.getElementById('list');
    list.innerHTML = '';

    [...active, ...excl].forEach((m, i) => {
      const isPenalty = !m.excl && m.rate < 40;
      const row = document.createElement('div');
      row.className = `row${isPenalty ? ' danger' : ''}${m.excl ? ' excluded' : ''}`;
      row.innerHTML = `
        <div class="num">${m.excl ? '—' : i + 1}</div>
        <div class="info">
          <div class="name">${m.name}${m.excl ? ` <span style="font-size:11px;color:#bbb;font-weight:400;">${EXCL_LBL[m.name]||''}</span>` : ''}</div>
          ${!m.excl ? `<div class="bar-wrap"><div class="bar-fill" data-w="${m.rate}" style="width:0%"></div></div>` : ''}
        </div>
        <div class="right">
          <div class="pct">${m.rate}%</div>
          <div class="cnt">${m.count}/${TOTAL}회</div>
          ${!m.excl ? `<button class="detail-btn" onclick="showDetail('${m.name}')">기록</button>` : ''}
        </div>
      `;
      list.appendChild(row);
    });

    setTimeout(() => {
      document.querySelectorAll('.bar-fill[data-w]').forEach(el => {
        el.style.width = el.dataset.w + '%';
      });
    }, 100);
  }

  function showDetail(name) {
    const dates = allDates[name] || [];
    document.getElementById('modalTitle').textContent = name;
    document.getElementById('modalBody').innerHTML = dates.length
      ? `<table><tbody>${dates.map((d,i)=>`<tr><td>${i+1}</td><td>${d}</td></tr>`).join('')}</tbody></table>`
      : '<p style="color:#ccc;text-align:center;padding:16px;">기록 없음</p>';
    document.getElementById('modal').classList.add('active');
  }

  load();
</script>
</body>
</html>
