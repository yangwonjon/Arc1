<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC2026</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    /* 기존 스타일 유지 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', Arial, sans-serif; text-align: center; background-color: #f8f9fa; color: #333; }

    .navbar { background-color: #333; display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; }
    .navbar a { color: white; padding: 14px 0; flex: 1; text-decoration: none; font-size: 14px; cursor: pointer; border-right: 1px solid #444; }
    .navbar a:last-child { border-right: none; }

    .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .page.active { display: block; }

    .home-content { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .home-logo img { width: 280px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

    /* 날씨 스타일 추가 */
    .weather-info { 
      width: 100%; max-width: 400px; background: white; border-radius: 16px; padding: 15px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .weather-grid { display: flex; justify-content: space-around; align-items: center; margin-top: 10px; }
    .weather-item { flex: 1; }
    .weather-item .label { font-size: 11px; color: #999; margin-bottom: 4px; }
    .weather-item .val { font-size: 16px; font-weight: bold; }

    .ranking-container { width: 100%; max-width: 400px; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .ranking-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #eee; }
    .rank-num { font-weight: 800; width: 24px; color: #999; }
    .rank-1 .rank-num { color: #f1c40f; font-size: 20px; }
    .rank-name { font-weight: bold; }
    .rank-val span { color: #27ae60; font-weight: bold; }

    /* 위치 바 & 기타 기존 스타일 */
    .loc-bar { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px auto; padding: 12px; border-radius: 30px; font-size: 13px; font-weight: bold; max-width: 360px; background: #f0f0f0; color: #888; }
    .loc-bar.ok { background: #e6f9ee; color: #27ae60; border: 1px solid #27ae60; }
    .loc-bar.bad { background: #fdecea; color: #e74c3c; border: 1px solid #e74c3c; }
    .loc-dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }
    .member-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 500px; margin: 15px auto; }
    .member-card { border: 2px solid #ddd; border-radius: 14px; padding: 20px 10px; background: white; cursor: pointer; transition: 0.2s; }
    .attendance-table { width: 100%; max-width: 600px; margin: 0 auto; border-collapse: collapse; background: white; }
    .attendance-table th, .attendance-table td { border: 1px solid #eee; padding: 10px; font-size: 13px; }
    .adj-btn { width: 32px; height: 32px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
    .notice-item { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #eee; text-align: left; position: relative; max-width: 500px; margin-inline: auto; }
    .delete-btn { position: absolute; top: 15px; right: 15px; background: #ffeded; color: #e74c3c; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    .btn-main { padding: 12px 24px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; max-width: 400px; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; }
  </style>
</head>
<body>

  <div class="navbar">
    <a onclick="showPage('home')">홈</a>
    <a onclick="showPage('attendance')">출석 체크</a>
    <a onclick="showPage('freeboard')">자유게시판</a>
    <a onclick="showPage('etc')">기타</a>
  </div>

  <div class="page active" id="page-home">
    <div class="home-content">
      <div class="home-logo"><img src="logo.png"></div>
      
      <div class="weather-info">
        <div style="font-size: 12px; font-weight: bold; color: #555;">📍 안덕면 생활체육공원 날씨</div>
        <div class="weather-grid">
          <div class="weather-item">
            <div class="label">현재 기온</div>
            <div class="val" style="color: #2c3e50;"><span id="currTemp">--</span>°C</div>
          </div>
          <div style="width: 1px; height: 25px; background: #eee;"></div>
          <div class="weather-item">
            <div class="label">오늘 20시</div>
            <div class="val" style="color: #e67e22;"><span id="tonightTemp">--</span>°C</div>
          </div>
          <div style="width: 1px; height: 25px; background: #eee;"></div>
          <div class="weather-item">
            <div class="label">강수량</div>
            <div class="val" style="color: #3498db;"><span id="rainAmount">0</span>mm</div>
          </div>
        </div>
      </div>

      <div class="ranking-container">
        <div class="ranking-title">🏆 실시간 출석 랭킹</div>
        <div id="homeRankingList"></div>
      </div>
      <button class="btn-main" style="background:#555;" onclick="openNoticeModal()">공지사항</button>
    </div>
  </div>

  <div class="page" id="page-attendance">
    <h2>출석 체크</h2>
    <div class="loc-bar checking" id="locBar"><span class="loc-dot"></span><span id="locText">위치 확인 중...</span></div>
    <div class="member-grid" id="memberGrid"></div>
    <div style="margin-top:40px;">
      <p style="font-size: 12px; color: #999; margin-bottom: 10px;">관리자 데이터 조정 (+/-)</p>
      <table class="attendance-table"><tbody id="attendanceBody"></tbody></table>
    </div>
  </div>

  <div class="page" id="page-freeboard">
    <h2>자유게시판</h2>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:30px;">
      <div style="display:flex; gap:5px; width:100%; max-width:400px;">
        <input type="text" id="noticeAuthor" placeholder="작성자" style="flex:2; padding:12px; border:1px solid #ddd; border-radius:8px;">
        <input type="password" id="noticePassword" placeholder="비번" maxlength="4" style="flex:1; padding:12px; border:1px solid #ddd; border-radius:8px;" inputmode="numeric">
      </div>
      <input type="text" id="noticeTitle" placeholder="제목" style="width:100%; max-width:400px; padding:12px; border:1px solid #ddd; border-radius:8px;">
      <textarea id="noticeContent" placeholder="내용을 입력하세요" rows="4" style="width:100%; max-width:400px; padding:12px; border:1px solid #ddd; border-radius:8px;"></textarea>
      <button class="btn-main" onclick="saveNotice()">글쓰기</button>
    </div>
    <div id="noticeList"></div>
  </div>

  <div class="page" id="page-etc">
    <h2>러닝 기록</h2>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <input type="text" id="runName" placeholder="이름" style="width:100%; max-width:400px; padding:10px; border:1px solid #ddd; border-radius:8px;">
      <input type="text" id="runDist" placeholder="거리(km)" style="width:100%; max-width:400px; padding:10px; border:1px solid #ddd; border-radius:8px;">
      <input type="text" id="runPace" placeholder="페이스" style="width:100%; max-width:400px; padding:10px; border:1px solid #ddd; border-radius:8px;">
      <button class="btn-main" onclick="saveRun()">저장</button>
    </div>
    <table class="attendance-table" style="margin-top:20px;"><tbody id="runBody"></tbody></table>
  </div>

  <div class="modal" id="noticeModal">
    <div class="modal-content">
      <h3 style="border-bottom:2px solid #333; padding-bottom:10px; margin-bottom:15px;">ARC 공지</h3>
      <div style="text-align:left; font-size:14px; line-height:1.8;">
        1. 회비 월 2만원 (카뱅 3333-16-7331916)<br>
        2. 정기모임 수, 금, 토 20:00<br>
        3. 당일 19시까지 카톡 보고 필수!
      </div>
      <button class="btn-main" style="margin-top:20px;" onclick="closeNoticeModal()">닫기</button>
    </div>
  </div>

  <script>
    const MEMBERS = ['윤민혁','고영지','김민수','송지용','양원준','지항민','김해건'];
    const TOTAL = 12, ADMIN_KEY = '1723', MASTER_KEY = '0179';
    const TARGET = { lat: 33.2889, lng: 126.3606 };

    const supabaseClient = window.supabase.createClient(
      "https://ndctjtuxpkwdldhqbnih.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kY3RqdHV4cGt3ZGxkaHFibmloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTgwMjAsImV4cCI6MjA5MDk5NDAyMH0.SrHCtqlNE4cgepGMw_NoPC56bnJIfV2_t7Hbmj5EXCY"
    );

    let locationOk = false;

    // 날씨 함수 추가 (에러 방어 포함)
    async function updateWeather() {
      const apiKey = "c1aa66c2cae50680cddc975fbf80a45a";
      try {
        const currRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${TARGET.lat}&lon=${TARGET.lng}&appid=${apiKey}&units=metric`);
        if(currRes.ok) {
          const currData = await currRes.json();
          document.getElementById('currTemp').innerText = Math.round(currData.main.temp);
          document.getElementById('rainAmount').innerText = currData.rain ? (currData.rain['1h'] || 0) : 0;
        }

        const foreRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${TARGET.lat}&lon=${TARGET.lng}&appid=${apiKey}&units=metric`);
        if(foreRes.ok) {
          const foreData = await foreRes.json();
          const tonight = foreData.list.find(item => item.dt_txt.includes("12:00:00")); // KST 21시 근처
          if(tonight) document.getElementById('tonightTemp').innerText = Math.round(tonight.main.temp);
        }
      } catch (e) { console.error("날씨 대기 중..."); }
    }

    async function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      if(id === 'home') { updateWeather(); loadHomeRanking(); } // 날씨 호출 추가
      if(id === 'attendance') { checkLocation(); loadAttendance(); }
      if(id === 'freeboard') loadNotices();
      if(id === 'etc') loadRunning();
    }

    // 위치/출석/공지사항/러닝 등 원본 함수 유지 (중략 없이 원본 그대로)
    function checkLocation() {
      const bar = document.getElementById('locBar'), txt = document.getElementById('locText');
      bar.className = 'loc-bar checking'; txt.textContent = '위치 확인 중...';
      if (!navigator.geolocation) { bar.className = 'loc-bar bad'; txt.textContent = 'GPS 미지원 기기'; return; }
      navigator.geolocation.getCurrentPosition(p => {
        const d = Math.round(getDist(p.coords.latitude, p.coords.longitude, TARGET.lat, TARGET.lng));
        locationOk = (d <= 500);
        bar.className = locationOk ? 'loc-bar ok' : 'loc-bar bad';
        txt.textContent = locationOk ? `✅ 출석 가능 구역 (${d}m)` : `너무 멀어요 (${d}m)`;
      }, () => { locationOk = false; bar.className = 'loc-bar bad'; txt.textContent = '위치 권한 필요 📍'; }, { enableHighAccuracy: true });
    }

    function getDist(l1, g1, l2, g2) {
      const R = 6371000, dL = (l2-l1)*Math.PI/180, dG = (g2-g1)*Math.PI/180;
      const a = Math.sin(dL/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dG/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function doAttend(name) {
      if (!locationOk) { alert('📍 안덕면생활체육공원 500m 이내에서만 가능!'); return; }
      if(confirm(name + '님 출석 체크할까요?')) {
        const { error } = await supabaseClient.from('attendance').insert([{ name, device_id: 'btn_' + Date.now() }]);
        if (error) alert('실패: ' + error.message); else { alert('✅ 완료!'); loadAttendance(); }
      }
    }

    async function loadAttendance() {
      const { data } = await supabaseClient.from('attendance').select('name');
      const counts = {}; MEMBERS.forEach(m => counts[m] = 0);
      data?.forEach(r => { if(counts[r.name] !== undefined) counts[r.name]++; });
      document.getElementById('memberGrid').innerHTML = MEMBERS.map(m => `<div class="member-card" onclick="doAttend('${m}')"><b>${m}</b><br><small style="color:#999">${counts[m]}회 완료</small></div>`).join('');
      document.getElementById('attendanceBody').innerHTML = MEMBERS.map(m => `<tr><td>${m}</td><td>${counts[m]}회</td><td>${Math.round(counts[m]/TOTAL*100)}%</td><td><button class="adj-btn" onclick="adjustAttendance('${m}', 1)">+</button> <button class="adj-btn" onclick="adjustAttendance('${m}', -1)">-</button></td></tr>`).join('');
    }

    async function adjustAttendance(name, delta) {
      const pw = prompt('관리자 비번 입력');
      if(pw !== ADMIN_KEY && pw !== MASTER_KEY) return alert('틀렸습니다.');
      if (delta === 1) await supabaseClient.from('attendance').insert([{ name, device_id: 'manual' }]);
      else {
        const { data } = await supabaseClient.from('attendance').select('id').eq('name', name).order('created_at', { ascending: false }).limit(1);
        if (data?.length > 0) await supabaseClient.from('attendance').delete().eq('id', data[0].id);
      }
      loadAttendance();
    }

    async function loadHomeRanking() {
      const { data } = await supabaseClient.from('attendance').select('name');
      const counts = {}; MEMBERS.forEach(m => counts[m] = 0);
      data?.forEach(r => { if(counts[r.name] !== undefined) counts[r.name]++; });
      const sorted = MEMBERS.map(n => ({ name: n, count: counts[n], rate: Math.round(counts[n]/TOTAL*100) })).sort((a,b) => b.count - a.count);
      document.getElementById('homeRankingList').innerHTML = sorted.map((m, i) => `<div class="ranking-item ${i < 3 ? 'rank-'+(i+1) : ''}"><span class="rank-num">${i+1}</span><span class="rank-name">${m.name}</span><span class="rank-val">${m.count}회 (<span>${m.rate}%</span>)</span></div>`).join('');
    }

    async function saveNotice() {
      const author = document.getElementById('noticeAuthor').value, title = document.getElementById('noticeTitle').value, content = document.getElementById('noticeContent').value, password = document.getElementById('noticePassword').value;
      if(!author || !title || !content || !password) return alert('모두 입력!');
      await supabaseClient.from('notices').insert([{ author, title, content, password }]);
      document.getElementById('noticeTitle').value = ''; document.getElementById('noticeContent').value = ''; loadNotices();
    }

    async function loadNotices() {
      const { data } = await supabaseClient.from('notices').select('*').order('created_at', { ascending: false });
      document.getElementById('noticeList').innerHTML = data.map(n => `<div class="notice-item"><button class="delete-btn" onclick="deleteNotice(${n.id})">삭제</button><h4>${n.title}</h4><p>${n.content}</p><div style="font-size:11px;color:#aaa;margin-top:8px;">${n.author} | ${new Date(n.created_at).toLocaleDateString()}</div></div>`).join('');
    }

    async function deleteNotice(id) {
      const pw = prompt('비번 입력');
      if(pw === MASTER_KEY) { await supabaseClient.from('notices').delete().eq('id', id); loadNotices(); return; }
      const { data } = await supabaseClient.from('notices').select('password').eq('id', id).single();
      if(data?.password === pw) { await supabaseClient.from('notices').delete().eq('id', id); loadNotices(); } else alert('틀림');
    }

    async function saveRun() {
      const name = document.getElementById('runName').value, dist = document.getElementById('runDist').value, pace = document.getElementById('runPace').value;
      await supabaseClient.from('running').insert([{ name, distance: dist, pace }]); loadRunning();
    }
    async function loadRunning() {
      const { data } = await supabaseClient.from('running').select('*').order('created_at', { ascending: false });
      document.getElementById('runBody').innerHTML = data.map(r => `<tr><td>${r.name}</td><td>${r.distance}km</td><td>${r.pace}</td></tr>`).join('');
    }

    function openNoticeModal() { document.getElementById('noticeModal').classList.add('active'); }
    function closeNoticeModal() { document.getElementById('noticeModal').classList.remove('active'); }

    // 초기 실행
    updateWeather();
    loadHomeRanking();
  </script>
</body>
</html>
