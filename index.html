<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>점검 중</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            /* 배경색을 조금 더 진한 톤으로 변경 */
            background-color: #2c3e50; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Pretendard', sans-serif;
        }

        .maintenance-container {
            text-align: center;
            padding: 50px;
            /* 테두리와 그림자 효과로 강조 */
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            /* 글자 크기를 훨씬 키웠습니다 */
            color: #e74c3c; /* 눈에 확 띄는 빨간색 계열 */
            font-size: 5rem; 
            margin: 0 0 20px 0;
            font-weight: 800;
        }

        p {
            color: #34495e;
            font-size: 1.8rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <p>점검중 입니다</p>
    </div>
</body>
</html>
