<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC2026</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', Arial, sans-serif; text-align: center; background-color: #f8f9fa; color: #333; }
    .navbar { background-color: #333; display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; }
    .navbar a { color: white; padding: 14px 0; flex: 1; text-decoration: none; font-size: 14px; cursor: pointer; border-right: 1px solid #444; }
    .navbar a:last-child { border-right: none; }
    .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .page.active { display: block; }
    .home-content { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .home-logo img { width: 280px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .weather-info { width: 100%; max-width: 450px; background: white; border-radius: 16px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .weather-grid { display: flex; justify-content: space-between; gap: 5px; margin-top: 8px; }
    .weather-item { flex: 1; padding: 8px 4px; border-radius: 10px; background: #fafafa; border: 1px solid #f0f0f0; min-width: 0; }
    .weather-item .label { font-size: 10px; color: #999; margin-bottom: 4px; white-space: nowrap; }
    .weather-item .val { font-size: 13px; font-weight: bold; white-space: nowrap; }
    .status-txt { font-size: 13px; font-weight: 800; display: block; margin-top: 2px; }
    .ranking-container { width: 100%; max-width: 400px; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .ranking-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #eee; }
    .rank-num { font-weight: 800; width: 24px; color: #999; }
    .rank-1 .rank-num { color: #f1c40f; font-size: 20px; }
    .rank-name { font-weight: bold; }
    .rank-val span { color: #27ae60; font-weight: bold; }
    .loc-bar { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px auto; padding: 12px; border-radius: 30px; font-size: 13px; font-weight: bold; max-width: 360px; background: #f0f0f0; color: #888; }
    .loc-bar.ok { background: #e6f9ee; color: #27ae60; border: 1px solid #27ae60; }
    .loc-bar.bad { background: #fdecea; color: #e74c3c; border: 1px solid #e74c3c; }
    .loc-dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }
    .member-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 500px; margin: 15px auto; }
    .member-card { border: 2px solid #ddd; border-radius: 14px; padding: 20px 10px; background: white; cursor: pointer; transition: 0.2s; }
    .attendance-table { width: 100%; max-width: 600px; margin: 0 auto; border-collapse: collapse; background: white; }
    .attendance-table td { border: 1px solid #eee; padding: 10px; font-size: 13px; }
    .adj-btn { width: 32px; height: 32px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
    
    .notice-item { background: white; padding: 18px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #eee; text-align: left; position: relative; max-width: 500px; margin-inline: auto; cursor: pointer; }
    .notice-img { width: 100%; border-radius: 8px; margin-top: 10px; display: block; object-fit: cover; max-height: 300px; }
    .delete-btn { position: absolute; top: 15px; right: 15px; background: #ffeded; color: #e74c3c; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; z-index: 10; }
    .btn-main { padding: 12px 24px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; max-width: 400px; }
    
    /* 기상청 버튼 스타일 */
    .kma-btn { display: block; background: #e3f2fd; color: #1976d2; text-decoration: none; padding: 12px; border-radius: 12px; font-size: 12px; font-weight: bold; border: 1px solid #bbdefb; margin-top: 10px; }

    .post-modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
    .post-modal.active { display: flex; }
    .post-modal-content { background: white; width: 95%; max-width: 500px; height: 90vh; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }
    .modal-main { padding: 20px; flex: 1; overflow-y: auto; text-align: left; }
    .cmt-box { background: #f9f9f9; padding: 15px; border-top: 1px solid #eee; display: flex; flex-direction: column; min-height: 300px; }
    #commentList { flex: 1; overflow-y: auto; margin-top: 10px; }
    .cmt-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
    .cmt-del { color: #e74c3c; font-size: 11px; cursor: pointer; margin-left: 8px; }
    .cmt-input-row { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
    .cmt-input-top { display: flex; gap: 5px; }
    .cmt-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
    .cmt-pw { width: 60px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; text-align: center; }
    .like-area { display: flex; gap: 15px; margin-top: 15px; font-weight: bold; }
    .like-btn { cursor: pointer; transition: 0.1s; display: flex; align-items: center; gap: 4px; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; }
  </style>
</head>
<body>

  <div class="navbar">
    <a onclick="showPage('home')">홈</a>
    <a onclick="showPage('attendance')">출석 체크</a>
    <a onclick="showPage('freeboard')">자유게시판</a>
    <a onclick="showPage('etc')">기타</a>
  </div>

  <div class="page active" id="page-home">
    <div class="home-content">
      <div class="home-logo"><img src="logo.png"></div>
      <div class="weather-info">
        <div style="font-size: 11px; font-weight: bold; color: #555;">📍 안덕면 실시간 날씨 (20시 기준)</div>
        <div class="weather-grid">
          <div class="weather-item"><div class="label">현재 기온</div><div class="val"><span id="currTemp">--</span>°</div></div>
          <div class="weather-item"><div class="label">20시/체감</div><div class="val"><span id="tonightTemp">--</span>°/<span id="tonightFeel">--</span>°</div></div>
          <div class="weather-item"><div class="label">비/확률</div><div class="val" style="color: #3498db;"><span id="rainForecast">0</span>m/<span id="rainPop">0</span>%</div></div>
          <div class="weather-item"><div class="label">미세먼지</div><div id="dustStatus" class="status-txt" style="color: #999;">확인중</div></div>
        </div>
        <a href="https://www.weather.go.kr/w/weather/forecast/short-term.do?stnId=184&address=%EC%A0%9C%EC%A3%BC%ED%8A%B9%EB%B3%84%EC%9E%90%EC%B9%98%EB%8F%84%20%EC%84%9C%EA%B7%80%ED%8F%AC%EC%8B%9C%20%EC%95%88%EB%8D%95%EB%A9%B4" target="_blank" class="kma-btn">기상청 안덕면 정밀예보 확인</a>
      </div>
      <div class="ranking-container">
        <div class="ranking-title">🏆 실시간 출석 랭킹</div>
        <div id="homeRankingList"></div>
      </div>
      <button class="btn-main" style="background:#555;" onclick="openNoticeModal()">공지사항</button>
    </div>
  </div>

  <div class="page" id="page-attendance">
    <h2>출석 체크</h2>
    <div class="loc-bar checking" id="locBar"><span class="loc-dot"></span><span id="locText">위치 확인 중...</span></div>
    <div class="member-grid" id="memberGrid"></div>
    <div style="margin-top:40px;">
      <p style="font-size: 12px; color: #999; margin-bottom: 10px;">관리자 데이터 조정 (+/-)</p>
      <table class="attendance-table"><tbody id="attendanceBody"></tbody></table>
    </div>
  </div>

  <div class="page" id="page-freeboard">
    <h2>자유게시판</h2>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:30px;">
      <div style="display:flex; gap:5px; width:100%; max-width:400px;">
        <input type="text" id="noticeAuthor" placeholder="작성자" style="flex:3; padding:12px; border:1px solid #ddd; border-radius:8px;">
        <input type="password" id="noticePassword" placeholder="비번" maxlength="4" style="width:60px; padding:12px; border:1px solid #ddd; border-radius:8px;" inputmode="numeric">
      </div>
      <input type="text" id="noticeTitle" placeholder="제목" style="width:100%; max-width:400px; padding:12px; border:1px solid #ddd; border-radius:8px;">
      <textarea id="noticeContent" placeholder="내용을 입력하세요" rows="4" style="width:100%; max-width:400px; padding:12px; border:1px solid #ddd; border-radius:8px;"></textarea>
      <label class="file-label" for="noticeFile" style="display: block; width: 100%; max-width: 400px; padding: 12px; background: #f0f0f0; border: 1px dashed #bbb; border-radius: 8px; font-size: 13px; cursor: pointer; color: #666; margin-bottom: 5px; text-align: center;">📸 사진 첨부 (선택)</label>
      <input type="file" id="noticeFile" accept="image/*" style="display:none;" onchange="updateFileName(this)">
      <div id="fileNameDisplay" style="font-size:11px; color:#27ae60; margin-bottom:5px;"></div>
      <button id="writeBtn" class="btn-main" onclick="saveNotice()">글쓰기</button>
    </div>
    <div id="noticeList"></div>
  </div>

  <div class="page" id="page-etc">
    <h2>러닝 기록</h2>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <input type="text" id="runName" placeholder="이름" style="width:100%; max-width:400px; padding:10px; border:1px solid #ddd; border-radius:8px;">
      <input type="text" id="runDist" placeholder="거리(km)" style="width:100%; max-width:400px; padding:10px; border:1px solid #ddd; border-radius:8px;">
      <input type="text" id="runPace" placeholder="페이스" style="width:100%; max-width:400px; padding:10px; border:1px solid #ddd; border-radius:8px;">
      <button class="btn-main" onclick="saveRun()">저장</button>
    </div>
    <table class="attendance-table" style="margin-top:20px;"><tbody id="runBody"></tbody></table>
  </div>

  <div class="post-modal" id="postDetailModal" onclick="closePostModal()">
    <div class="post-modal-content" onclick="event.stopPropagation()">
      <div class="modal-main" id="modalDetailContent"></div>
      <div class="cmt-box">
        <div id="modalLikeArea" class="like-area" style="padding-bottom: 10px; border-bottom: 1px solid #eee; margin-bottom: 10px;"></div>
        <div style="font-weight:bold; font-size:14px;">댓글</div>
        <div id="commentList"></div>
        <div class="cmt-input-row">
          <div class="cmt-input-top">
            <input type="text" id="cmtInput" class="cmt-input" placeholder="댓글 내용을 입력하세요">
            <input type="password" id="cmtPw" class="cmt-pw" placeholder="비번" maxlength="4" inputmode="numeric">
          </div>
          <button onclick="addComment()" style="padding:10px; background:#333; color:white; border:none; border-radius:8px; font-weight:bold;">등록</button>
        </div>
      </div>
      <button onclick="closePostModal()" style="padding:15px; border:none; background:#eee; font-weight:bold; cursor:pointer;">닫기</button>
    </div>
  </div>

  <div class="modal" id="noticeModal">
    <div class="modal-content">
      <h3>ARC 공지</h3>
      <div style="text-align:left; font-size:14px; line-height:1.8; margin-top:15px;">
        1. 회비 월 2만원 (카뱅 3333-16-7331916)<br>
        2. 정기모임 수, 금, 토 20:00<br>
        3. 당일 19시까지 카톡 보고 필수!
      </div>
      <button class="btn-main" style="margin-top:20px;" onclick="closeNoticeModal()">닫기</button>
    </div>
  </div>

  <script>
    const MEMBERS = ['윤민혁','고영지','김민수','송지용','양원준','지항민','김해건'];
    const TOTAL = 12, ADMIN_KEY = '1723', MASTER_KEY = '0179';
    const TARGET = { lat: 33.2889, lng: 126.3606 };
    const supabaseClient = window.supabase.createClient("https://ndctjtuxpkwdldhqbnih.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kY3RqdHV4cGt3ZGxkaHFibmloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTgwMjAsImV4cCI6MjA5MDk5NDAyMH0.SrHCtqlNE4cgepGMw_NoPC56bnJIfV2_t7Hbmj5EXCY");

    let locationOk = false, allNotices = [], currentPostId = null;
    let counts = { like: {}, dislike: {} };

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    async function updateWeather() {
      const apiKey = "c1aa66c2cae50680cddc975fbf80a45a";
      try {
        const currRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${TARGET.lat}&lon=${TARGET.lng}&appid=${apiKey}&units=metric`);
        if(currRes.ok) { const currData = await currRes.json(); document.getElementById('currTemp').innerText = Math.round(currData.main.temp); }
        const foreRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${TARGET.lat}&lon=${TARGET.lng}&appid=${apiKey}&units=metric`);
        if(foreRes.ok) {
          const foreData = await foreRes.json();
          const tonight = foreData.list.find(item => item.dt_txt.includes("12:00:00")) || foreData.list[0];
          const rawPop = tonight.pop || 0;
          const adjustedPop = Math.min(100, Math.round(rawPop * 120 + (rawPop > 0.05 ? 10 : 0)));
          document.getElementById('tonightTemp').innerText = Math.round(tonight.main.temp);
          document.getElementById('tonightFeel').innerText = Math.round(tonight.main.feels_like);
          document.getElementById('rainForecast').innerText = tonight.rain ? (tonight.rain['3h'] || 0) : 0;
          document.getElementById('rainPop').innerText = adjustedPop;
        }
      } catch (e) {}
    }

    async function loadNotices() {
      const { data } = await supabaseClient.from('notices').select('*').order('created_at', { ascending: false });
      allNotices = data;
      document.getElementById('noticeList').innerHTML = data.map((n, i) => {
        if (counts.like[n.id] === undefined) counts.like[n.id] = 0;
        if (counts.dislike[n.id] === undefined) counts.dislike[n.id] = 0;
        return `
          <div class="notice-item" onclick="openPostModal(${i})">
            <button class="delete-btn" onclick="event.stopPropagation(); deleteNotice(${n.id})">삭제</button>
            <h4 style="margin-bottom:5px;">${n.title}</h4>
            <div style="font-size:11px; color:#bbb; margin-bottom:8px;">${n.author} / ${formatDate(n.created_at)}</div>
            ${n.image_url ? `<img src="${n.image_url}" class="notice-img">` : ''}
            <p style="margin-top:10px; color:#666; font-size:13px;">${n.content.substring(0, 30)}...</p>
            <div class="like-area" style="font-size:11px; color:#aaa; margin-top:12px;">
              <span>👍 <span id="list-like-${n.id}">${counts.like[n.id]}</span></span>
              <span>👎 <span id="list-dislike-${n.id}">${counts.dislike[n.id]}</span></span>
              <span>💬 댓글</span>
            </div>
          </div>
        `;
      }).join('');
    }

    async function openPostModal(idx) {
      const n = allNotices[idx];
      currentPostId = n.id;
      document.getElementById('modalDetailContent').innerHTML = `
        <div style="font-size:12px; color:#888;">${n.author} | ${new Date(n.created_at).toLocaleString()}</div>
        <h3 style="margin: 15px 0;">${n.title}</h3>
        <div style="line-height:1.6; white-space:pre-wrap;">${n.content}</div>
        ${n.image_url ? `<img src="${n.image_url}" style="width:100%; border-radius:10px; margin-top:15px;">` : ''}
      `;
      document.getElementById('modalLikeArea').innerHTML = `
        <div class="like-btn" onclick="handleReaction(${n.id}, 'like')" style="color:#c62917;">👍 <span id="modal-like-${n.id}">${counts.like[n.id]}</span></div>
        <div class="like-btn" onclick="handleReaction(${n.id}, 'dislike')" style="color:#1976d2;">👎 <span id="modal-dislike-${n.id}">${counts.dislike[n.id]}</span></div>
      `;
      await loadComments(n.id);
      document.getElementById('postDetailModal').classList.add('active');
    }

    async function loadComments(postId) {
      const { data } = await supabaseClient.from('comments').select('*').eq('post_id', postId).order('created_at', { ascending: true });
      const listEl = document.getElementById('commentList');
      if (!data || data.length === 0) listEl.innerHTML = '<div style="color:#999; font-size:12px; padding:10px 0;">등록된 댓글이 없습니다.</div>';
      else listEl.innerHTML = data.map(c => `<div class="cmt-item"><span><b>익명:</b> ${c.content}</span><span class="cmt-del" onclick="deleteComment(${c.id}, '${c.password}')">삭제</span></div>`).join('');
    }

    async function addComment() {
      const content = document.getElementById('cmtInput').value, password = document.getElementById('cmtPw').value;
      if(!content || !password) return alert('내용과 비번을 입력하세요!');
      const { error } = await supabaseClient.from('comments').insert([{ post_id: currentPostId, content, password }]);
      if (error) alert('등록 실패');
      else { document.getElementById('cmtInput').value = ''; document.getElementById('cmtPw').value = ''; loadComments(currentPostId); }
    }

    async function deleteComment(cmtId, correctPw) {
      const inputPw = prompt('댓글 비밀번호 입력');
      if (inputPw === correctPw || inputPw === MASTER_KEY) {
        await supabaseClient.from('comments').delete().eq('id', cmtId);
        loadComments(currentPostId);
      } else alert('비밀번호가 틀렸습니다.');
    }

    function handleReaction(id, type) {
      const storageKey = `reacted_${type}_${id}`;
      if (localStorage.getItem(storageKey)) { counts[type][id]--; localStorage.removeItem(storageKey); }
      else { counts[type][id]++; localStorage.setItem(storageKey, 'true'); }
      document.getElementById(`modal-${type}-${id}`).innerText = counts[type][id];
      const listEl = document.getElementById(`list-${type}-${id}`);
      if(listEl) listEl.innerText = counts[type][id];
    }

    function closePostModal() { document.getElementById('postDetailModal').classList.remove('active'); currentPostId = null; }

    async function doAttend(name) {
      if (!locationOk) return alert("500m 이내만 출석 가능합니다.");
      if (!confirm(`${name}님, 출석 체크하시겠습니까?`)) return;
      const today = new Date().toISOString().split('T')[0];
      const { data: existing } = await supabaseClient.from('attendance').select('id').eq('name', name).gte('created_at', today);
      if (existing?.length > 0) return alert("이미 오늘 출석하셨습니다.");
      await supabaseClient.from('attendance').insert([{ name, device_id: navigator.userAgent }]);
      alert(`${name}님 출석 완료!`); loadAttendance(); loadHomeRanking();
    }

    async function loadAttendance() {
      const { data } = await supabaseClient.from('attendance').select('name');
      const countsAtt = {}; MEMBERS.forEach(m => countsAtt[m] = 0);
      data?.forEach(r => { if(countsAtt[r.name] !== undefined) countsAtt[r.name]++; });
      document.getElementById('memberGrid').innerHTML = MEMBERS.map(m => `<div class="member-card" onclick="doAttend('${m}')"><b>${m}</b><br><small style="color:#999">${countsAtt[m]}회</small></div>`).join('');
      document.getElementById('attendanceBody').innerHTML = MEMBERS.map(m => `<tr><td>${m}</td><td>${countsAtt[m]}회</td><td>${Math.round(countsAtt[m]/TOTAL*100)}%</td><td><button class="adj-btn" onclick="adjustAttendance('${m}', 1)">+</button> <button class="adj-btn" onclick="adjustAttendance('${m}', -1)">-</button></td></tr>`).join('');
    }

    function checkLocation() {
      const bar = document.getElementById('locBar'), txt = document.getElementById('locText');
      navigator.geolocation.getCurrentPosition(p => {
        const d = Math.round(getDist(p.coords.latitude, p.coords.longitude, TARGET.lat, TARGET.lng));
        locationOk = (d <= 500); bar.className = locationOk ? 'loc-bar ok' : 'loc-bar bad';
        txt.textContent = locationOk ? `✅ 출석 가능 (${d}m)` : `너무 멀어요 (${d}m)`;
      }, () => { locationOk = false; bar.className = 'loc-bar bad'; txt.textContent = 'GPS 권한 필요'; }, { enableHighAccuracy: true });
    }

    function getDist(l1, g1, l2, g2) {
      const R = 6371000, dL = (l2-l1)*Math.PI/180, dG = (g2-g1)*Math.PI/180;
      const a = Math.sin(dL/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dG/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function saveNotice() {
      const author = document.getElementById('noticeAuthor').value, title = document.getElementById('noticeTitle').value, content = document.getElementById('noticeContent').value, password = document.getElementById('noticePassword').value, fileInput = document.getElementById('noticeFile');
      if(!author || !title || !content || !password) return alert('입력 확인!');
      const btn = document.getElementById('writeBtn'); btn.disabled = true; btn.innerText = "업로드 중...";
      let imageUrl = null;
      if (fileInput.files.length > 0) {
        const fileName = `${Date.now()}.jpg`;
        await supabaseClient.storage.from('notices').upload(fileName, fileInput.files[0]);
        imageUrl = supabaseClient.storage.from('notices').getPublicUrl(fileName).data.publicUrl;
      }
      await supabaseClient.from('notices').insert([{ author, title, content, password, image_url: imageUrl }]);
      location.reload();
    }

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      if(id === 'home') { updateWeather(); loadHomeRanking(); }
      if(id === 'attendance') { checkLocation(); loadAttendance(); }
      if(id === 'freeboard') loadNotices();
    }

    async function loadHomeRanking() {
      const { data } = await supabaseClient.from('attendance').select('name');
      const countsRanking = {}; MEMBERS.forEach(m => countsRanking[m] = 0);
      data?.forEach(r => { if(countsRanking[r.name] !== undefined) countsRanking[r.name]++; });
      const sorted = MEMBERS.map(n => ({ name: n, count: countsRanking[n], rate: Math.round(countsRanking[n]/TOTAL*100) })).sort((a,b) => b.count - a.count);
      document.getElementById('homeRankingList').innerHTML = sorted.map((m, i) => `<div class="ranking-item ${i < 3 ? 'rank-'+(i+1) : ''}"><span class="rank-num">${i+1}</span><span class="rank-name">${m.name}</span><span class="rank-val">${m.count}회 (<span>${m.rate}%</span>)</span></div>`).join('');
    }

    async function adjustAttendance(name, delta) {
      const pw = prompt('관리자 비번'); if(pw !== ADMIN_KEY && pw !== MASTER_KEY) return alert('비번 틀림');
      if (delta === 1) await supabaseClient.from('attendance').insert([{ name, device_id: 'manual' }]);
      else { const { data } = await supabaseClient.from('attendance').select('id').eq('name', name).order('created_at', { ascending: false }).limit(1); if (data?.length > 0) await supabaseClient.from('attendance').delete().eq('id', data[0].id); }
      loadAttendance();
    }

    function updateFileName(i) { if(i.files.length > 0) document.getElementById('fileNameDisplay').innerText = "✅ 사진 선택됨: " + i.files[0].name; }
    function openNoticeModal() { document.getElementById('noticeModal').classList.add('active'); }
    function closeNoticeModal() { document.getElementById('noticeModal').classList.remove('active'); }
    async function deleteNotice(id) {
      const pw = prompt('비번');
      const { data } = await supabaseClient.from('notices').select('password').eq('id', id).single();
      if(pw === MASTER_KEY || data?.password === pw) { await supabaseClient.from('notices').delete().eq('id', id); loadNotices(); }
      else alert('틀림');
    }

    updateWeather(); loadHomeRanking();
  </script>
</body>
</html>
