<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC2026</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', Arial, sans-serif; text-align: center; background-color: #f8f9fa; color: #333; }

    .navbar { background-color: #333; display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; }
    .navbar a { color: white; padding: 14px 0; flex: 1; text-decoration: none; font-size: 14px; cursor: pointer; border-right: 1px solid #444; }
    .navbar a:last-child { border-right: none; }

    .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .page.active { display: block; }

    .home-content { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .home-logo img { width: 280px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    .weather-info { width: 100%; max-width: 400px; background: white; border-radius: 16px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .weather-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
    .weather-item { padding: 10px; border: 1px solid #f5f5f5; border-radius: 12px; background: #fafafa; display: flex; flex-direction: column; justify-content: center; min-height: 80px; }
    .weather-item .label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .weather-item .val { font-size: 14px; font-weight: bold; }
    .status-txt { font-size: 16px; font-weight: 800; display: block; margin-top: 2px; }

    .ranking-container { width: 100%; max-width: 400px; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .ranking-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #eee; }
    .rank-num { font-weight: 800; width: 24px; color: #999; }
    .rank-1 .rank-num { color: #f1c40f; font-size: 20px; }
    .rank-name { font-weight: bold; }
    .rank-val span { color: #27ae60; font-weight: bold; }

    .loc-bar { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px auto; padding: 12px; border-radius: 30px; font-size: 13px; font-weight: bold; max-width: 360px; background: #f0f0f0; color: #888; }
    .loc-bar.ok { background: #e6f9ee; color: #27ae60; border: 1px solid #27ae60; }
    .loc-bar.bad { background: #fdecea; color: #e74c3c; border: 1px solid #e74c3c; }
    .loc-dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }

    .member-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 500px; margin: 15px auto; }
    .member-card { border: 2px solid #ddd; border-radius: 14px; padding: 20px 10px; background: white; cursor: pointer; }

    .attendance-table { width: 100%; max-width: 600px; margin: 0 auto; border-collapse: collapse; background: white; }
    .attendance-table th, .attendance-table td { border: 1px solid #eee; padding: 10px; font-size: 13px; }
    .adj-btn { width: 32px; height: 32px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; font-weight: bold; }

    .btn-main { padding: 12px 24px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; max-width: 400px; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; }
    
    .kma-btn { display: block; background: #e3f2fd; color: #1976d2; text-decoration: none; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: bold; border: 1px solid #bbdefb; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="navbar">
    <a onclick="showPage('home')">홈</a>
    <a onclick="showPage('attendance')">출석 체크</a>
    <a onclick="showPage('freeboard')">자유게시판</a>
    <a onclick="showPage('etc')">기타</a>
  </div>

  <div class="page active" id="page-home">
    <div class="home-content">
      <div class="home-logo"><img src="logo.png"></div>
      
      <div class="weather-info">
        <div style="font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px;">📍 안덕면 생활체육공원 날씨 (보정됨)</div>
        <div class="weather-grid">
          <div class="weather-item">
            <div class="label">20시 기온 / 체감</div>
            <div class="val"><span id="tonightTemp">--</span>°C / <span id="tonightFeel">--</span>°C</div>
          </div>
          <div class="weather-item">
            <div class="label">현재 실시간 기온</div>
            <div class="val"><span id="currTemp">--</span>°C</div>
          </div>
          <div class="weather-item">
            <div class="label">18~21시 비 / 확률</div>
            <div class="val" style="color: #3498db;"><span id="rainForecast">0</span>mm / <span id="rainPop">0</span>%</div>
          </div>
          <div class="weather-item">
            <div class="label">20시 미세먼지 (한국기준)</div>
            <div id="dustStatus" class="status-txt" style="color: #999;">확인 중</div>
          </div>
        </div>
        <a href="https://www.weather.go.kr/w/weather/forecast/short-term.do?stnId=184&address=%EC%A0%9C%EC%A3%BC%ED%8A%B9%EB%B3%84%EC%9E%90%EC%B9%98%EB%8F%84%20%EC%84%9C%EA%B7%80%ED%8F%AC%EC%8B%9C%20%EC%95%88%EB%8D%95%EB%A9%B4" target="_blank" class="kma-btn">기상청 안덕면 정밀예보 확인</a>
      </div>

      <div class="ranking-container">
        <div id="homeRankingList"></div>
      </div>
      <button class="btn-main" style="background:#555;" onclick="openNoticeModal()">공지사항</button>
    </div>
  </div>

  <div class="page" id="page-attendance">
    <h2>출석 체크</h2>
    <div class="loc-bar checking" id="locBar"><span class="loc-dot"></span><span id="locText">위치 확인 중...</span></div>
    <div class="member-grid" id="memberGrid"></div>
    <div style="margin-top:40px;">
      <p style="font-size: 12px; color: #999; margin-bottom: 10px;">관리자 데이터 조정 (+/-)</p>
      <table class="attendance-table"><tbody id="attendanceBody"></tbody></table>
    </div>
  </div>

  <div class="page" id="page-freeboard">
    <h2>자유게시판</h2>
    <div id="noticeList"></div>
  </div>

  <div class="modal" id="noticeModal">
    <div class="modal-content">
      <h3>ARC 공지</h3>
      <div style="text-align:left; font-size:14px; line-height:1.8; margin-top:15px;">
        1. 회비 월 2만원 (카뱅 3333-16-7331916)<br>
        2. 정기모임 수, 금, 토 20:00<br>
        3. 당일 19시까지 카톡 보고 필수!
      </div>
      <button class="btn-main" style="margin-top:20px;" onclick="closeNoticeModal()">닫기</button>
    </div>
  </div>

  <script>
    const MEMBERS = ['윤민혁','고영지','김민수','송지용','양원준','지항민','김해건'];
    const TOTAL = 12, ADMIN_KEY = '1723', MASTER_KEY = '0179';
    const TARGET = { lat: 33.2889, lng: 126.3606 };

    const supabaseClient = window.supabase.createClient(
      "https://ndctjtuxpkwdldhqbnih.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kY3RqdHV4cGt3ZGxkaHFibmloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTgwMjAsImV4cCI6MjA5MDk5NDAyMH0.SrHCtqlNE4cgepGMw_NoPC56bnJIfV2_t7Hbmj5EXCY"
    );

    async function updateWeather() {
      const apiKey = "c1aa66c2cae50680cddc975fbf80a45a";
      try {
        const currRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${TARGET.lat}&lon=${TARGET.lng}&appid=${apiKey}&units=metric`);
        if(currRes.ok) {
          const currData = await currRes.json();
          document.getElementById('currTemp').innerText = Math.round(currData.main.temp);
        }

        const foreRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${TARGET.lat}&lon=${TARGET.lng}&appid=${apiKey}&units=metric`);
        if(foreRes.ok) {
          const foreData = await foreRes.json();
          const tonight = foreData.list.find(item => item.dt_txt.includes("12:00:00")) || foreData.list[0];
          
          // [보정] 해외 데이터 강수확률(pop)은 0~1 사이로 옴. 1.2배 상향 + 비 기미가 보이면 가산점
          const rawPop = tonight.pop || 0;
          const adjustedPop = Math.min(100, Math.round(rawPop * 120 + (rawPop > 0.05 ? 10 : 0)));
          
          document.getElementById('tonightTemp').innerText = Math.round(tonight.main.temp);
          document.getElementById('tonightFeel').innerText = Math.round(tonight.main.feels_like);
          document.getElementById('rainForecast').innerText = tonight.rain ? (tonight.rain['3h'] || 0) : 0;
          document.getElementById('rainPop').innerText = adjustedPop;
        }

        const dustRes = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution/forecast?lat=${TARGET.lat}&lon=${TARGET.lng}&appid=${apiKey}`);
        if(dustRes.ok) {
          const dustData = await dustRes.json();
          const d = dustData.list[0].components;
          // 한국 환경부 기준 PM10 보정 (해외 기준보다 엄격하게)
          let status = "", color = "";
          if (d.pm10 <= 30) { status = "좋음"; color = "#27ae60"; }
          else if (d.pm10 <= 80) { status = "보통"; color = "#f1c40f"; }
          else if (d.pm10 <= 150) { status = "나쁨"; color = "#e67e22"; }
          else { status = "매우 나쁨"; color = "#e74c3c"; }
          
          const statusEl = document.getElementById('dustStatus');
          statusEl.innerText = status;
          statusEl.style.color = color;
        }
      } catch (e) {}
    }

    async function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      if(id === 'home') { updateWeather(); loadHomeRanking(); }
      if(id === 'attendance') { checkLocation(); loadAttendance(); }
    }

    function checkLocation() {
      navigator.geolocation.getCurrentPosition(p => {
        const d = Math.round(getDist(p.coords.latitude, p.coords.longitude, TARGET.lat, TARGET.lng));
        const ok = (d <= 500);
        document.getElementById('locBar').className = ok ? 'loc-bar ok' : 'loc-bar bad';
        document.getElementById('locText').textContent = ok ? `✅ 출석 가능 구역 (${d}m)` : `너무 멀어요 (${d}m)`;
      });
    }

    function getDist(l1, g1, l2, g2) {
      const R = 6371000, dL = (l2-l1)*Math.PI/180, dG = (g2-g1)*Math.PI/180;
      const a = Math.sin(dL/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dG/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function loadHomeRanking() {
      const { data } = await supabaseClient.from('attendance').select('name');
      const counts = {}; MEMBERS.forEach(m => counts[m] = 0);
      data?.forEach(r => { if(counts[r.name] !== undefined) counts[r.name]++; });
      const sorted = MEMBERS.map(n => ({ name: n, count: counts[n] })).sort((a,b) => b.count - a.count);
      document.getElementById('homeRankingList').innerHTML = sorted.map((m, i) => `<div class="ranking-item"><span class="rank-num">${i+1}</span><span class="rank-name">${m.name}</span><span class="rank-val">${m.count}회</span></div>`).join('');
    }

    function openNoticeModal() { document.getElementById('noticeModal').classList.add('active'); }
    function closeNoticeModal() { document.getElementById('noticeModal').classList.remove('active'); }

    updateWeather();
    loadHomeRanking();
  </script>
</body>
</html>
